<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ballet History | Login</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/login.css" />

  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>


  <div class="header">
    <div class="container">
      <nav class="navbar">
        <ul>
          <li><a href="#classicos">Clássicos</a></li>

          <li><a href="#proposito">Propósito</a></li>

          <li class="item_destaque"><a href="index.html">Início</a></li>

          <li><a href="login.html">Login</a></li>

          <li><a href="cadastro.html">Cadastro</a></li>

    </div>

    </ul>
    </nav>
  </div>
  </div>


  <div class="alerta_erro">
    <div class="card_erro" id="cardErro">
      <span id="mensagem_erro"></span>
    </div>
  </div>


  <div class="pagina-login">
    <div class="card-login">

      <h1 class="titulo-card">Ballet History</h1>
      <p class="subtitulo-card">Olá de volta!</p>

      <div class="formulario">

        <div class="campo">
          <span>E-mail:</span>
          <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
        </div>

        <div class="campo">
          <span>Senha:</span>
          <input id="senha_input" type="password" placeholder="••••••" />
        </div>

        <button class="botao" onclick="entrar()">Entrar</button>

      </div>


      <div id="div_aguardar" class="loading-div">
        <img src="./assets/circle-loading.gif" id="loading-gif" />
      </div>


      <div id="div_erros_login"></div>


      <p class="link-login">
        Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>
      </p>

    </div>
  </div>


  <div class="footer">
    <div class="container">
      <p>Desenvolvido por Yasmin Eloíta Nascimento • 2026</p>
    </div>
  </div>

</body>

</html>


<script>


  function entrar() {
    aguardar();

    var emailVar = email_input.value;
    var senhaVar = senha_input.value;

    if (emailVar == "" || senhaVar == "") {
      cardErro.style.display = "block"
      mensagem_erro.innerHTML = "Preencha todos os campos";
      finalizarAguardar();
      return false;
    }
    else {
      setInterval(sumirMensagem, 5000)
    }

    console.log("FORM LOGIN: ", emailVar);
    console.log("FORM SENHA: ", senhaVar);

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar
      })
    }).then(function (resposta) {
      console.log("ESTOU NO THEN DO entrar()!")

      if (resposta.ok) {
        console.log(resposta);

        resposta.json().then(json => {
          console.log("Dados do usuário:", json);

          sessionStorage.ID_USUARIO = json.id;
          sessionStorage.NOME_USUARIO = json.nome;
          sessionStorage.PONTUACAO = json.pontuacao_total;
          sessionStorage.PERSONAGEM_IDEAL = json.personagem_ideal;
          sessionStorage.QUIZZES_FEITOS = json.qtd_quizzes;

          window.location = "dashboard/dashboard.html";
        });

      } else {

        console.log("Houve um erro ao tentar realizar o login!");

        resposta.text().then(texto => {
          console.error(texto);
          finalizarAguardar(texto);
        });
      }

    }).catch(function (erro) {
      console.log(erro);
    })

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none"
  }



</script>
